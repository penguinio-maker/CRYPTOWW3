<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light Tanks</title>
  <style>
    :root {
      --bg: #101820;
      --panel: #162635;
      --text: #e8f2ff;
      --accent: #5cc8ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 10%, #1e3345, var(--bg) 60%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      padding: 12px;
    }
    .hidden { display: none !important; }
    .main-screen {
      width: min(980px, 100%);
      margin: 0 auto;
      min-height: calc(100vh - 24px);
      display: grid;
      place-items: center;
    }
    .main-card {
      width: min(560px, 100%);
      background: color-mix(in srgb, #162635 90%, black);
      border: 1px solid #2f4b62;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .main-title {
      margin: 0 0 8px;
      font-family: "Courier New", monospace;
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 900;
      letter-spacing: 1px;
      color: #e8f2ff;
      text-shadow: 2px 2px 0 #1d5878;
      text-transform: uppercase;
    }
    .main-sub {
      margin: 0 0 16px;
      opacity: 0.9;
      font-size: 14px;
    }
    .main-actions {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    .lobbies-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
    }
    .lobbies-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 10, 16, 0.45);
    }
    .lobbies-window {
      position: relative;
      width: min(64vw, 860px);
      height: min(64vh, 560px);
      min-width: 520px;
      min-height: 360px;
      background: color-mix(in srgb, #162635 92%, black);
      border: 1px solid #3c5e78;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 10px;
    }
    .lobbies-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .lobbies-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }
    .lobbies-close {
      width: 30px;
      height: 30px;
      border: 1px solid #6791ad;
      border-radius: 8px;
      background: #1f3647;
      color: #e8f2ff;
      cursor: pointer;
      font-weight: 700;
    }
    .lobbies-actions {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .lobby-input {
      height: 38px;
      border-radius: 8px;
      border: 1px solid #4f7088;
      background: #0e1c28;
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      text-transform: uppercase;
    }
    .lobby-meta {
      min-height: 18px;
      font-size: 12px;
      color: #b9d8ea;
      text-align: left;
    }
    .my-lobby-card {
      border: 1px solid #8ea0af;
      background: rgba(20, 33, 45, 0.72);
      border-radius: 10px;
      padding: 12px;
      text-align: left;
      margin-bottom: 10px;
    }
    .lobby-list {
      border: 1px solid #2f4b62;
      border-radius: 10px;
      background: rgba(6, 14, 22, 0.45);
      padding: 8px;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: #5f7385 #12202c;
    }
    .lobby-list::-webkit-scrollbar {
      width: 10px;
    }
    .lobby-list::-webkit-scrollbar-track {
      background: #12202c;
      border-radius: 10px;
    }
    .lobby-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #617688, #445766);
      border-radius: 10px;
      border: 2px solid #12202c;
    }
    .lobby-list::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #73899b, #516675);
    }
    .lobby-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid #8ea0af;
      border-radius: 10px;
      margin-bottom: 10px;
      background: rgba(20, 33, 45, 0.72);
      text-align: left;
    }
    .lobby-item:last-child { margin-bottom: 0; }
    .lobby-item-title {
      font-size: 14px;
      font-weight: 800;
      color: #e8f2ff;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }
    .lobby-item-line {
      font-size: 12px;
      color: #bfd5e5;
      line-height: 1.35;
    }
    .lobby-code-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0 10px;
      padding: 6px 10px;
      border: 1px solid #8ea0af;
      border-radius: 8px;
      background: rgba(12, 23, 33, 0.82);
      color: #e8f2ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      cursor: pointer;
      user-select: none;
      width: fit-content;
    }
    .lobby-code-hint {
      color: #9aaab7;
      font-weight: 600;
    }
    .lobby-code-chip:hover {
      border-color: #b3c0cb;
      background: rgba(18, 31, 43, 0.95);
    }
    .lobby-join-btn {
      width: 96px;
      height: 34px;
      justify-self: end;
      align-self: center;
    }
    .lobby-empty {
      padding: 18px;
      border: 1px dashed #4b667a;
      border-radius: 8px;
      text-align: center;
      color: #b9d8ea;
    }
    .lobby-form-layer {
      position: absolute;
      inset: 0;
      background: rgba(7, 13, 20, 0.6);
      display: grid;
      place-items: center;
      border-radius: 14px;
      z-index: 3;
      padding: 16px;
    }
    .lobby-form-card {
      width: min(460px, 100%);
      background: #112131;
      border: 1px solid #3c5e78;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
      text-align: left;
    }
    .lobby-form-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    .lobby-form-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #cfe6f5;
    }
    .lobby-help {
      font-size: 12px;
      color: #b9d8ea;
      line-height: 1.35;
    }
    .lobby-error {
      min-height: 14px;
      font-size: 12px;
      color: #ff6b6b;
      line-height: 1.2;
    }
    .lobby-form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .secondary-btn {
      height: 36px;
      border: 1px solid #6f8ba0;
      border-radius: 8px;
      background: linear-gradient(180deg, #3a5568, #253947);
      color: #e8f2ff;
      font-size: 13px;
      font-weight: 700;
      padding: 0 12px;
      cursor: pointer;
    }
    .main-action-btn {
      height: 42px;
      border: 1px solid #5cc8ff;
      border-radius: 8px;
      background: linear-gradient(180deg, #52bdf3, #2f95c8);
      color: #e8f2ff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .main-form {
      text-align: left;
      margin-bottom: 12px;
    }
    .main-meta {
      min-height: 20px;
      font-size: 12px;
      color: #b9d8ea;
      margin-bottom: 10px;
    }
    .app {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: block;
    }
    .menu {
      background: color-mix(in srgb, #162635 90%, black);
      border: 1px solid #2f4b62;
      border-radius: 12px;
      padding: 16px 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }
    .game-name {
      margin: 0 0 14px;
      font-family: "Courier New", monospace;
      font-size: clamp(28px, 3.6vw, 40px);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 2px 2px 0 #1d5878;
      text-align: center;
    }
    .nick-label, .camo-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .nick-field { position: relative; margin-bottom: 12px; }
    .nick-input {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: 1px solid #4f7088;
      background: #0e1c28;
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
      outline: none;
    }
    .nick-input::placeholder { color: transparent; }
    .nick-prompt {
      position: absolute;
      left: 12px;
      top: 11px;
      font-size: 16px;
      color: #b5cadb;
      pointer-events: none;
      opacity: 1;
      transition: opacity 120ms ease;
    }
    .nick-input:not(:placeholder-shown) + .nick-prompt { opacity: 0; }
    .cursor { display: inline-block; width: 8px; animation: blink 0.9s steps(1, end) infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .mode-btn, .start-btn {
      height: 40px;
      border: 1px solid #5cc8ff;
      border-radius: 8px;
      background: linear-gradient(180deg, #52bdf3, #2f95c8);
      color: #e8f2ff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .start-btn { height: 42px; margin-bottom: 8px; }
    .mode-meta { min-height: 20px; font-size: 12px; color: #b9d8ea; margin-bottom: 8px; }

    .camo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 12px;
      width: 100%;
    }
    .camo-btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 7px;
      border: 1px solid #4f7088;
      cursor: pointer;
      position: relative;
      padding: 0;
      background: #111;
    }
    .camo-btn[aria-pressed="true"] { border-color: #9ee5ff; box-shadow: 0 0 0 2px rgba(92, 200, 255, 0.25); }
    .camo-btn::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 4px;
      background: var(--pattern);
      opacity: 0.95;
    }

    .wrap {
      width: 100%;
      background: color-mix(in srgb, #162635 92%, black);
      border: 1px solid #2f4b62;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      font-size: 14px;
      border-bottom: 1px solid #2f4b62;
    }
    .hint { opacity: 0.9; }
    .back-btn {
      height: 30px;
      padding: 0 10px;
      border: 1px solid #5cc8ff;
      border-radius: 7px;
      background: linear-gradient(180deg, #52bdf3, #2f95c8);
      color: #e8f2ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .cancel-btn {
      height: 30px;
      padding: 0 10px;
      border: 1px solid #7aa4c0;
      border-radius: 7px;
      background: linear-gradient(180deg, #3c6884, #27485e);
      color: #e8f2ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: linear-gradient(#23374a, #1f3142);
      cursor: none;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="mainMenu" class="main-screen">
    <div class="main-card">
      <h1 class="main-title">Crypto WW3</h1>
      <p class="main-sub">Choose a mode to start the battle.</p>
      <div class="main-form">
        <label class="nick-label" for="nickname">Nickname</label>
        <div class="nick-field">
          <input id="nickname" class="nick-input" type="text" maxlength="18" placeholder="Enter nickname" />
          <div class="nick-prompt">Enter nickname<span class="cursor">|</span></div>
        </div>
      </div>
      <div class="main-actions">
        <button id="menuPlayAiBtn" class="main-action-btn" type="button">Play vs AI</button>
        <button id="menuPlayOnlineRandomBtn" class="main-action-btn" type="button">Play Online 1v1 (Random)</button>
        <button id="menuOpenLobbiesBtn" class="main-action-btn" type="button">Lobbies</button>
      </div>
      <div id="modeMeta" class="main-meta"></div>
      <div class="main-form">
        <div class="camo-title">Tank Camo</div>
        <div class="camo-grid" id="camoGrid">
          <button class="camo-btn" data-camo="classic" aria-pressed="true" style="--pattern: repeating-linear-gradient(135deg, #4f7f45 0 8px, #c2ab73 8px 16px, #365a32 16px 24px);"></button>
          <button class="camo-btn" data-camo="obsidian" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #1c232b 0 8px, #9e8553 8px 16px, #2f3740 16px 24px);"></button>
          <button class="camo-btn" data-camo="arctic" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #d4e2ec 0 8px, #6d8293 8px 16px, #f6fafc 16px 24px);"></button>
          <button class="camo-btn" data-camo="royal" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #17406d 0 8px, #66b8ff 8px 16px, #102844 16px 24px);"></button>
          <button class="camo-btn" data-camo="crimson" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #612426 0 8px, #e08973 8px 16px, #2b1011 16px 24px);"></button>
          <button class="camo-btn" data-camo="emerald" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #155747 0 8px, #8ad3a9 8px 16px, #0b3228 16px 24px);"></button>
          <button class="camo-btn" data-camo="violet" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #3d2b70 0 8px, #cc9bff 8px 16px, #1f1536 16px 24px);"></button>
          <button class="camo-btn" data-camo="sunset" aria-pressed="false" style="--pattern: repeating-linear-gradient(135deg, #7a4311 0 8px, #ffc870 8px 16px, #3b220c 16px 24px);"></button>
        </div>
      </div>
    </div>
  </section>
  <div id="lobbiesModal" class="lobbies-modal hidden">
    <div id="lobbiesBackdrop" class="lobbies-backdrop"></div>
    <div class="lobbies-window">
      <div class="lobbies-head">
        <h2 class="lobbies-title">Lobbies</h2>
        <button id="lobbiesCloseBtn" class="lobbies-close" type="button">X</button>
      </div>
      <div class="lobbies-actions">
        <button id="menuCreateLobbyBtn" class="main-action-btn" type="button">Create Lobby</button>
        <input id="menuJoinLobbyInput" class="lobby-input" type="text" maxlength="8" placeholder="Lobby code" />
        <button id="menuJoinLobbyBtn" class="main-action-btn" type="button">Join Lobby</button>
      </div>
      <div id="lobbyMeta" class="lobby-meta"></div>
      <div id="myLobbyCard" class="my-lobby-card hidden"></div>
      <div id="lobbiesList" class="lobby-list"></div>
      <div id="createLobbyFormLayer" class="lobby-form-layer hidden">
        <div class="lobby-form-card">
          <h3 class="lobby-form-title">Create Lobby</h3>
          <label class="lobby-form-label" for="createLobbyNameInput">Lobby Name</label>
          <input id="createLobbyNameInput" class="lobby-input" type="text" maxlength="24" placeholder="Enter lobby name" />
          <div id="createLobbyNameError" class="lobby-error"></div>
          <label class="lobby-form-label" for="createLobbyPasswordInput">Password (optional)</label>
          <input id="createLobbyPasswordInput" class="lobby-input" type="password" maxlength="24" placeholder="Enter password (optional)" />
          <div class="lobby-help">Password is optional. Use it only if you want to make the lobby private.</div>
          <label class="lobby-form-label" for="createLobbyModeInput">Game Mode</label>
          <select id="createLobbyModeInput" class="lobby-input">
            <option value="1v1" selected>1v1</option>
            <option value="2v2">2v2</option>
            <option value="3v3">3v3</option>
            <option value="4v4">4v4</option>
          </select>
          <div class="lobby-form-actions">
            <button id="createLobbyCancelBtn" class="secondary-btn" type="button">Cancel</button>
            <button id="createLobbySubmitBtn" class="main-action-btn" type="button" style="height:36px;width:112px;">Create</button>
          </div>
        </div>
      </div>
      <div id="joinPasswordFormLayer" class="lobby-form-layer hidden">
        <div class="lobby-form-card">
          <h3 id="joinPasswordTitle" class="lobby-form-title">Enter password</h3>
          <label class="lobby-form-label" for="joinPasswordInput">Enter password</label>
          <input id="joinPasswordInput" class="lobby-input" type="password" maxlength="24" placeholder="Password" />
          <div class="lobby-form-actions">
            <button id="joinPasswordCancelBtn" class="secondary-btn" type="button">Cancel</button>
            <button id="joinPasswordSubmitBtn" class="main-action-btn" type="button" style="height:36px;width:112px;">Join</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="gameApp" class="app hidden">
    <div class="wrap">
      <div class="top">
        <div><strong>Light Tanks</strong> - AI / Online</div>
        <div id="status">Press R to start</div>
        <div class="hint">WASD - move, Mouse - aim, LMB/Space - shoot, R - restart (AI)</div>
        <button id="cancelSearchBtn" class="cancel-btn hidden" type="button">Cancel Search</button>
        <button id="backToMenuBtn" class="back-btn" type="button">Main Menu</button>
      </div>
      <canvas id="game" width="960" height="540" tabindex="0"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const modeMetaEl = document.getElementById("modeMeta");
    const lobbyMetaEl = document.getElementById("lobbyMeta");
    const mainMenuEl = document.getElementById("mainMenu");
    const gameAppEl = document.getElementById("gameApp");
    const backToMenuBtn = document.getElementById("backToMenuBtn");
    const cancelSearchBtn = document.getElementById("cancelSearchBtn");
    const menuPlayAiBtn = document.getElementById("menuPlayAiBtn");
    const menuPlayOnlineRandomBtn = document.getElementById("menuPlayOnlineRandomBtn");
    const menuOpenLobbiesBtn = document.getElementById("menuOpenLobbiesBtn");
    const menuCreateLobbyBtn = document.getElementById("menuCreateLobbyBtn");
    const menuJoinLobbyBtn = document.getElementById("menuJoinLobbyBtn");
    const menuJoinLobbyInput = document.getElementById("menuJoinLobbyInput");
    const lobbiesModalEl = document.getElementById("lobbiesModal");
    const lobbiesBackdropEl = document.getElementById("lobbiesBackdrop");
    const lobbiesCloseBtn = document.getElementById("lobbiesCloseBtn");
    const myLobbyCardEl = document.getElementById("myLobbyCard");
    const lobbiesListEl = document.getElementById("lobbiesList");
    const createLobbyFormLayerEl = document.getElementById("createLobbyFormLayer");
    const createLobbyNameInput = document.getElementById("createLobbyNameInput");
    const createLobbyNameErrorEl = document.getElementById("createLobbyNameError");
    const createLobbyPasswordInput = document.getElementById("createLobbyPasswordInput");
    const createLobbyModeInput = document.getElementById("createLobbyModeInput");
    const createLobbyCancelBtn = document.getElementById("createLobbyCancelBtn");
    const createLobbySubmitBtn = document.getElementById("createLobbySubmitBtn");
    const joinPasswordFormLayerEl = document.getElementById("joinPasswordFormLayer");
    const joinPasswordTitle = document.getElementById("joinPasswordTitle");
    const joinPasswordInput = document.getElementById("joinPasswordInput");
    const joinPasswordCancelBtn = document.getElementById("joinPasswordCancelBtn");
    const joinPasswordSubmitBtn = document.getElementById("joinPasswordSubmitBtn");
    const nicknameInput = document.getElementById("nickname");
    const camoGrid = document.getElementById("camoGrid");
    const camoButtons = Array.from(document.querySelectorAll(".camo-btn"));

    const world = { w: canvas.width, h: canvas.height };
    const keys = new Set();

    let mode = "ai";
    let gameStarted = false;
    let gameOver = false;
    let winner = "";
    let lastTime = 0;
    let selectedCamoId = "classic";
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    let hasMouse = false;
    let onlineSocket = null;
    let myId = null;
    let lastSentInputAt = 0;
    let shootQueued = false;
    let onlineShootSoundCd = 0;
    const ONLINE_SERVER_URL = "wss://tank-server-q9td.onrender.com";
    let reconnectAfterClose = false;
    let appScreen = "menu";
    let loopStarted = false;
    let onlineSearchActive = false;
    let pendingOnlineAction = null;
    let activeLobbyCode = "";
    let lobbyList = [];
    let myLobbyState = null;
    let pendingJoinLobbyCode = "";
    let createLobbyPending = false;
    let createLobbyTimeoutId = null;
    let pendingCreatedLobbyMode = "";
    let pendingCreatedLobbyMaxPlayers = 0;
    let audioCtx = null;
    let currentMusicTrack = null;
    let currentMusicMode = "none";
    let desiredMusicMode = "menu";
    let audioUnlocked = false;

    const CAMOS = {
      classic: { body: "#4f7f45", stripe: "#c2ab73", turret: "#365a32", barrel: "#1b2a18" },
      obsidian: { body: "#1c232b", stripe: "#9e8553", turret: "#2f3740", barrel: "#0f151b" },
      arctic: { body: "#d4e2ec", stripe: "#6d8293", turret: "#f6fafc", barrel: "#9aa9b4" },
      royal: { body: "#17406d", stripe: "#66b8ff", turret: "#102844", barrel: "#091729" },
      crimson: { body: "#612426", stripe: "#e08973", turret: "#2b1011", barrel: "#180809" },
      emerald: { body: "#155747", stripe: "#8ad3a9", turret: "#0b3228", barrel: "#061d16" },
      violet: { body: "#3d2b70", stripe: "#cc9bff", turret: "#1f1536", barrel: "#130d22" },
      sunset: { body: "#7a4311", stripe: "#ffc870", turret: "#3b220c", barrel: "#231406" }
    };
    const ENEMY_CAMO = { body: "#7b3d43", stripe: "#ff9da2", turret: "#3a1b1f", barrel: "#261116" };
    const maxForwardSpeed = 190;
    const maxReverseSpeed = 115;
    const acceleration = 520;
    const braking = 780;
    const friction = 5.2;
    const turnSpeed = 3.4;
    const recoilStrength = 18;
    const totalRounds = 3;
    const roundTime = 60;
    const LOBBY_MODE_LIMITS = {
      "1v1": 2,
      "2v2": 4,
      "3v3": 6,
      "4v4": 8
    };

    function createTank(x, y, camo, angle) {
      return {
        x, y, w: 38, h: 26, angle, driveSpeed: 0, angularVelocity: 0, camo, hp: 3, fireCd: 0,
        aiState: "approach",
        aiDecisionTimer: 0,
        aiStrafeDir: 1,
        aiBias: 0,
        aiLastX: x,
        aiLastY: y,
        aiStuckTimer: 0
      };
    }
    function baseWalls() {
      return [
        { x: 300, y: 180, w: 100, h: 60, hp: 3 },
        { x: 300, y: 300, w: 100, h: 60, hp: 3 },
        { x: 560, y: 180, w: 100, h: 60, hp: 3 },
        { x: 560, y: 300, w: 100, h: 60, hp: 3 },
        { x: 440, y: 240, w: 80, h: 60, hp: 3 }
      ];
    }

    let player, enemy, bullets, walls;
    let onlineState = null;
    let currentRound = 1;
    let roundWinners = [];
    let roundTimer = roundTime;
    let roundEnded = false;
    let roundTransitionTimer = 0;
    let roundResult = "draw";

    function setMode(nextMode) {
      mode = nextMode;
      menuPlayAiBtn.style.filter = mode === "ai" ? "brightness(1.08)" : "";
      menuPlayOnlineRandomBtn.style.filter = mode === "online" ? "brightness(1.08)" : "";
      menuOpenLobbiesBtn.style.filter = mode === "online" ? "brightness(1.08)" : "";
      modeMetaEl.textContent = mode === "ai" ? "" : `Server required: ${ONLINE_SERVER_URL}`;
      statusEl.textContent = mode === "ai" ? "Press R to start" : "Online mode";
    }

    function resetAiRound() {
      player = createTank(120, 270, CAMOS[selectedCamoId], 0);
      enemy = createTank(840, 270, ENEMY_CAMO, Math.PI);
      bullets = [];
      walls = baseWalls();
      roundTimer = roundTime;
      roundEnded = false;
      roundTransitionTimer = 0;
      roundResult = "draw";
    }

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function makeAmbientTrack(kind) {
      const isBattle = kind === "game";
      const bpm = isBattle ? 94 : 72;
      const stepDur = 60 / bpm / 2;
      const stepsPerBar = 8;
      const totalSteps = 32;
      const barDur = stepsPerBar * stepDur;
      const output = audioCtx.createGain();
      output.gain.value = 0;
      const toneBus = audioCtx.createGain();
      const color = audioCtx.createBiquadFilter();
      const compressor = audioCtx.createDynamicsCompressor();
      toneBus.gain.value = 1;
      color.type = "lowpass";
      color.frequency.value = isBattle ? 2300 : 1900;
      color.Q.value = 0.35;
      compressor.threshold.value = -18;
      compressor.knee.value = 16;
      compressor.ratio.value = 2.5;
      compressor.attack.value = 0.01;
      compressor.release.value = 0.25;
      toneBus.connect(color);
      color.connect(compressor);
      compressor.connect(output);
      output.connect(audioCtx.destination);

      const activeNodes = new Set();
      let timerId = null;
      let step = 0;
      let nextStepAt = audioCtx.currentTime + 0.09;

      const roots = isBattle ? [38, 41, 43, 36] : [45, 43, 50, 48];
      const menuLead = [0, null, 2, null, 4, null, 2, null, 0, null, -2, null, 0, null, 2, null, 5, null, 7, null, 5, null, 4, null, 2, null, 0, null, -2, null, 0, null];
      const battleLead = [12, null, 14, null, 15, 14, 12, null, 10, null, 12, null, 14, 12, 10, null, 12, null, 14, null, 15, 17, 15, null, 14, null, 12, null, 10, 12, 10, null];
      const bassRel = isBattle ? [0, 0, 3, 0, 5, 3, 0, -2] : [0, 0, 2, 0, 0, -2, 0, -5];

      function registerNode(osc, gainNode, filterNode) {
        const entry = { osc, gainNode, filterNode };
        activeNodes.add(entry);
        osc.onended = () => activeNodes.delete(entry);
      }

      function scheduleNote(when, midi, duration, amp, type, cutoffHz) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = type;
        osc.frequency.setValueAtTime(midiToFreq(midi), when);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(cutoffHz, when);
        filter.Q.value = 0.25;

        const attack = 0.02;
        const release = 0.12;
        gain.gain.setValueAtTime(0.0001, when);
        gain.gain.linearRampToValueAtTime(amp, when + attack);
        gain.gain.setValueAtTime(amp, when + Math.max(attack + 0.02, duration * 0.55));
        gain.gain.linearRampToValueAtTime(0.0001, when + duration + release);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(toneBus);
        osc.start(when);
        osc.stop(when + duration + release + 0.04);
        registerNode(osc, gain, filter);
      }

      function scheduleKick(when, level) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(120, when);
        osc.frequency.exponentialRampToValueAtTime(45, when + 0.18);
        gain.gain.setValueAtTime(0.0001, when);
        gain.gain.linearRampToValueAtTime(level, when + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.22);
        osc.connect(gain);
        gain.connect(toneBus);
        osc.start(when);
        osc.stop(when + 0.26);
        registerNode(osc, gain, null);
      }

      function scheduleStep(stepIndex, when) {
        const barIndex = Math.floor(stepIndex / stepsPerBar) % roots.length;
        const root = roots[barIndex];

        if (stepIndex % stepsPerBar === 0) {
          scheduleNote(when, root + 12, barDur * 0.95, isBattle ? 0.018 : 0.021, "triangle", isBattle ? 1800 : 1500);
          scheduleNote(when, root + 19, barDur * 0.95, isBattle ? 0.013 : 0.016, "sine", isBattle ? 1600 : 1300);
          scheduleNote(when, root + 24, barDur * 0.95, isBattle ? 0.009 : 0.011, "triangle", isBattle ? 1900 : 1600);
        }

        const bassIndex = Math.floor(stepIndex / 2) % bassRel.length;
        if (stepIndex % 2 === 0) {
          scheduleNote(when, root - 12 + bassRel[bassIndex], stepDur * (isBattle ? 1.4 : 1.7), isBattle ? 0.062 : 0.05, isBattle ? "sawtooth" : "triangle", isBattle ? 560 : 480);
        }

        const leadRel = (isBattle ? battleLead : menuLead)[stepIndex % totalSteps];
        if (leadRel != null) {
          const leadMidi = root + leadRel + (isBattle ? 12 : 7);
          scheduleNote(when, leadMidi, stepDur * (isBattle ? 0.9 : 1.05), isBattle ? 0.028 : 0.023, "triangle", isBattle ? 2400 : 2100);
        }

        if (isBattle) {
          if (stepIndex % 4 === 0) scheduleKick(when, 0.06);
          if (stepIndex % 8 === 6) scheduleKick(when, 0.045);
        }
      }

      function scheduler() {
        const lookAhead = 0.22;
        while (nextStepAt < audioCtx.currentTime + lookAhead) {
          scheduleStep(step, nextStepAt);
          nextStepAt += stepDur;
          step = (step + 1) % totalSteps;
        }
      }

      return {
        output,
        start() {
          scheduler();
          timerId = setInterval(scheduler, 50);
        },
        stop() {
          if (timerId) clearInterval(timerId);
          for (const node of activeNodes) {
            try { node.osc.stop(); } catch {}
            try { node.gainNode.disconnect(); } catch {}
            try { if (node.filterNode) node.filterNode.disconnect(); } catch {}
          }
          activeNodes.clear();
          try { toneBus.disconnect(); } catch {}
          try { color.disconnect(); } catch {}
          try { compressor.disconnect(); } catch {}
          try { output.disconnect(); } catch {}
        }
      };
    }

    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playShootSound() {
      if (!audioUnlocked) return;
      ensureAudioContext();
      const now = audioCtx.currentTime;
      const output = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const oscA = audioCtx.createOscillator();
      const oscB = audioCtx.createOscillator();

      output.gain.setValueAtTime(0.0001, now);
      output.gain.linearRampToValueAtTime(0.045, now + 0.01);
      output.gain.exponentialRampToValueAtTime(0.0001, now + 0.19);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2200, now);
      filter.frequency.exponentialRampToValueAtTime(900, now + 0.18);
      filter.Q.value = 0.4;

      oscA.type = "triangle";
      oscB.type = "sine";
      oscA.frequency.setValueAtTime(760, now);
      oscA.frequency.exponentialRampToValueAtTime(290, now + 0.18);
      oscB.frequency.setValueAtTime(520, now);
      oscB.frequency.exponentialRampToValueAtTime(210, now + 0.17);

      oscA.connect(filter);
      oscB.connect(filter);
      filter.connect(output);
      output.connect(audioCtx.destination);

      oscA.start(now);
      oscB.start(now);
      oscA.stop(now + 0.21);
      oscB.stop(now + 0.21);
      oscA.onended = () => {
        try { oscA.disconnect(); } catch {}
        try { oscB.disconnect(); } catch {}
        try { filter.disconnect(); } catch {}
        try { output.disconnect(); } catch {}
      };
    }

    function fadeOutAndStop(track, duration = 0.7) {
      if (!track || !audioCtx) return;
      const now = audioCtx.currentTime;
      track.output.gain.cancelScheduledValues(now);
      track.output.gain.setValueAtTime(track.output.gain.value, now);
      track.output.gain.linearRampToValueAtTime(0.0001, now + duration);
      setTimeout(() => track.stop(), Math.max(120, duration * 1000 + 80));
    }

    function startTrack(mode) {
      ensureAudioContext();
      const next = makeAmbientTrack(mode);
      next.start();
      const target = mode === "game" ? 0.22 : 0.19;
      const now = audioCtx.currentTime;
      next.output.gain.setValueAtTime(0.0001, now);
      next.output.gain.linearRampToValueAtTime(target, now + 0.8);
      return next;
    }

    function playMenuMusic() {
      desiredMusicMode = "menu";
      if (!audioUnlocked) return;
      if (currentMusicMode === "menu") return;
      if (currentMusicTrack) fadeOutAndStop(currentMusicTrack, 0.8);
      currentMusicTrack = startTrack("menu");
      currentMusicMode = "menu";
    }

    function playGameMusic() {
      desiredMusicMode = "game";
      if (!audioUnlocked) return;
      if (currentMusicMode === "game") return;
      if (currentMusicTrack) fadeOutAndStop(currentMusicTrack, 0.55);
      currentMusicTrack = startTrack("game");
      currentMusicMode = "game";
    }

    function stopMusic() {
      desiredMusicMode = "none";
      if (currentMusicTrack) {
        fadeOutAndStop(currentMusicTrack, 0.45);
        currentMusicTrack = null;
      }
      currentMusicMode = "none";
    }

    function syncMusicWithScreen() {
      if (appScreen === "game") playGameMusic();
      else playMenuMusic();
    }

    function unlockAudioAndSync() {
      ensureAudioContext();
      audioCtx.resume().then(() => {
        audioUnlocked = true;
        if (desiredMusicMode === "game") playGameMusic();
        else if (desiredMusicMode === "menu") playMenuMusic();
      }).catch(() => {});
    }
    function startAiGame() {
      currentRound = 1;
      roundWinners = [];
      gameOver = false;
      winner = "";
      resetAiRound();
      gameStarted = true;
      statusEl.textContent = "Battle in progress";
    }
    function enterWaitingState() {
      gameStarted = false;
      gameOver = false;
      winner = "";
      bullets = [];
      currentRound = 1;
      roundWinners = [];
      roundTimer = roundTime;
      roundEnded = false;
      roundTransitionTimer = 0;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function approachAngle(current, target, maxStep) {
      let diff = target - current;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      if (Math.abs(diff) <= maxStep) return target;
      return current + Math.sign(diff) * maxStep;
    }
    function formatNickname(name, fallback) {
      const clean = (name || "").trim() || fallback;
      return clean.length > 9 ? `${clean.slice(0, 9)}...` : clean;
    }
    function rectsOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
    function tankRect(t) { return { x: t.x - t.w / 2, y: t.y - t.h / 2, w: t.w, h: t.h }; }
    function canMoveTo(tank, nx, ny) {
      const next = { x: nx - tank.w / 2, y: ny - tank.h / 2, w: tank.w, h: tank.h };
      if (next.x < 0 || next.y < 0 || next.x + next.w > world.w || next.y + next.h > world.h) return false;
      for (const wall of walls) if (rectsOverlap(next, wall)) return false;
      return true;
    }

    function shoot(tank, owner) {
      if (!gameStarted || tank.fireCd > 0 || gameOver) return;
      if (mode === "ai" && roundEnded) return;
      tank.fireCd = 0.45;
      bullets.push({ x: tank.x + Math.cos(tank.angle) * 24, y: tank.y + Math.sin(tank.angle) * 24, vx: Math.cos(tank.angle) * 380, vy: Math.sin(tank.angle) * 380, r: 4, owner });
      tank.driveSpeed -= recoilStrength;
      playShootSound();
    }
    function finishAiRound(side) {
      if (roundEnded || gameOver) return;
      roundEnded = true;
      roundTransitionTimer = 1.05;
      roundResult = side;
      roundWinners.push(side);
      statusEl.textContent = side === "player" ? "Round won" : side === "enemy" ? "Round lost" : "Round draw";
    }

    function finishAiMatch() {
      const playerWins = roundWinners.filter((x) => x === "player").length;
      const enemyWins = roundWinners.filter((x) => x === "enemy").length;
      winner = playerWins === enemyWins ? "Match draw" : playerWins > enemyWins ? "You win match!" : "AI wins match";
      gameOver = true;
      gameStarted = false;
      statusEl.textContent = `${winner} Press R to restart`;
    }

    function resolveAiTimerRound() {
      if (player.hp > enemy.hp) finishAiRound("player");
      else if (enemy.hp > player.hp) finishAiRound("enemy");
      else finishAiRound("draw");
    }

    function damageTank(tank, by) {
      tank.hp -= 1;
      if (tank.hp <= 0) {
        finishAiRound(by === "player" ? "player" : "enemy");
      }
    }

    function normalizeAngleDiff(from, to) {
      return Math.atan2(Math.sin(to - from), Math.cos(to - from));
    }

    function moveTankWithSlide(tank, dt) {
      const vx = Math.cos(tank.angle) * tank.driveSpeed;
      const vy = Math.sin(tank.angle) * tank.driveSpeed;
      const nx = tank.x + vx * dt;
      const ny = tank.y + vy * dt;

      if (canMoveTo(tank, nx, ny)) {
        tank.x = nx;
        tank.y = ny;
        return;
      }

      let moved = false;
      if (canMoveTo(tank, nx, tank.y)) {
        tank.x = nx;
        moved = true;
      }
      if (canMoveTo(tank, tank.x, ny)) {
        tank.y = ny;
        moved = true;
      }
      if (moved) {
        tank.driveSpeed *= 0.76;
      } else {
        tank.driveSpeed *= 0.2;
      }
    }

    function updateTankDrive(tank, dt, throttleInput, turnInput) {
      const targetSpeed = throttleInput >= 0 ? throttleInput * maxForwardSpeed : throttleInput * maxReverseSpeed;
      const changingDirection = Math.sign(targetSpeed) !== Math.sign(tank.driveSpeed) && Math.abs(tank.driveSpeed) > 4 && Math.abs(targetSpeed) > 0;
      const accelRate = changingDirection ? braking : acceleration;

      if (Math.abs(targetSpeed) > 0.01) {
        tank.driveSpeed += clamp(targetSpeed - tank.driveSpeed, -accelRate * dt, accelRate * dt);
      } else {
        const stopMul = Math.exp(-friction * dt);
        tank.driveSpeed *= stopMul;
        if (Math.abs(tank.driveSpeed) < 1.5) tank.driveSpeed = 0;
      }

      const speedRatio = Math.min(Math.abs(tank.driveSpeed) / maxForwardSpeed, 1);
      const turnGrip = 1 - speedRatio * 0.4;
      const targetAngular = turnInput * turnSpeed * turnGrip;
      tank.angularVelocity += clamp(targetAngular - tank.angularVelocity, -14 * dt, 14 * dt);
      tank.angularVelocity *= Math.exp(-7 * dt);
      tank.angle += tank.angularVelocity * dt;

      moveTankWithSlide(tank, dt);
      tank.fireCd = Math.max(0, tank.fireCd - dt);
    }

    function updatePlayer(dt) {
      const throttleInput = (keys.has("KeyW") ? 1 : 0) + (keys.has("KeyS") ? -1 : 0);
      const turnInput = (keys.has("KeyD") ? 1 : 0) + (keys.has("KeyA") ? -1 : 0);
      updateTankDrive(player, dt, throttleInput, turnInput);

      // Keep mouse aim responsive while preserving tank-like turning limits.
      if (hasMouse) {
        const aimAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
        const align = normalizeAngleDiff(player.angle, aimAngle);
        player.angularVelocity += clamp(align * 3.1, -3.5, 3.5) * dt;
      }
    }

    function updateEnemy(dt) {
      const toX = player.x - enemy.x;
      const toY = player.y - enemy.y;
      const dist = Math.hypot(toX, toY);

      let desiredAngle = Math.atan2(toY, toX);

      // Re-evaluate behavior every short interval to avoid frame-by-frame twitching.
      enemy.aiDecisionTimer -= dt;
      if (enemy.aiDecisionTimer <= 0) {
        if (dist > 285) enemy.aiState = "approach";
        else if (dist < 115) enemy.aiState = "retreat";
        else enemy.aiState = "fight";
        enemy.aiDecisionTimer = 0.5;
        if (Math.random() < 0.12) enemy.aiStrafeDir *= -1;
      }

      let throttleInput = 0;
      if (enemy.aiState === "approach") {
        throttleInput = 1;
      } else if (enemy.aiState === "retreat") {
        desiredAngle += enemy.aiStrafeDir * 0.25;
        throttleInput = -0.35;
      } else {
        desiredAngle += enemy.aiStrafeDir * 0.28;
        throttleInput = dist < 170 ? 0.55 : 0.9;
      }

      const angleDiff = normalizeAngleDiff(enemy.angle, desiredAngle);
      const turnInput = clamp(angleDiff / 1.05, -1, 1);
      if (Math.abs(angleDiff) > 1.35) throttleInput *= 0.8;
      updateTankDrive(enemy, dt, throttleInput, turnInput);

      const moved = Math.hypot(enemy.x - enemy.aiLastX, enemy.y - enemy.aiLastY);
      enemy.aiLastX = enemy.x;
      enemy.aiLastY = enemy.y;
      if (Math.abs(throttleInput) > 0.4 && moved < 0.35) enemy.aiStuckTimer += dt;
      else enemy.aiStuckTimer = Math.max(0, enemy.aiStuckTimer - dt * 2);
      if (enemy.aiStuckTimer > 0.55) {
        enemy.aiStrafeDir *= -1;
        enemy.aiState = "approach";
        enemy.aiDecisionTimer = 0.35;
        enemy.aiStuckTimer = 0;
      }

      // Fire only when roughly aimed at player.
      const aimError = Math.abs(normalizeAngleDiff(enemy.angle, Math.atan2(toY, toX)));
      const aimedEnough = aimError < 0.68;
      if (dist < 430 && aimedEnough && enemy.fireCd <= 0) {
        shoot(enemy, "enemy");
      }
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        if (b.x < -10 || b.y < -10 || b.x > world.w + 10 || b.y > world.h + 10) { bullets.splice(i, 1); continue; }

        let hitWall = false;
        for (let w = walls.length - 1; w >= 0; w--) {
          const wall = walls[w];
          if (b.x > wall.x && b.x < wall.x + wall.w && b.y > wall.y && b.y < wall.y + wall.h) {
            wall.hp -= 1;
            if (wall.hp <= 0) walls.splice(w, 1);
            bullets.splice(i, 1);
            hitWall = true;
            break;
          }
        }
        if (hitWall) continue;

        const pRect = tankRect(player);
        const eRect = tankRect(enemy);
        if (b.owner !== "player" && b.x > pRect.x && b.x < pRect.x + pRect.w && b.y > pRect.y && b.y < pRect.y + pRect.h) { bullets.splice(i, 1); damageTank(player, "enemy"); continue; }
        if (b.owner !== "enemy" && b.x > eRect.x && b.x < eRect.x + eRect.w && b.y > eRect.y && b.y < eRect.y + eRect.h) { bullets.splice(i, 1); damageTank(enemy, "player"); }
      }
    }

    function drawTank(tank) {
      ctx.save();
      ctx.translate(tank.x, tank.y);
      const bodyLean = clamp((tank.angularVelocity || 0) * 0.09 + (tank.driveSpeed || 0) * 0.0008, -0.08, 0.08);
      ctx.rotate(tank.angle + bodyLean);
      ctx.fillStyle = tank.camo.body;
      ctx.fillRect(-tank.w / 2, -tank.h / 2, tank.w, tank.h);
      ctx.fillStyle = tank.camo.stripe;
      ctx.fillRect(-tank.w / 2 + 4, -4, tank.w - 8, 4);
      ctx.fillRect(-tank.w / 2 + 6, 3, tank.w - 12, 3);
      ctx.fillStyle = tank.camo.turret;
      ctx.fillRect(-tank.w * 0.1, -tank.h * 0.25, tank.w * 0.35, tank.h * 0.5);
      ctx.fillStyle = tank.camo.barrel;
      ctx.fillRect(0, -3, 26, 6);
      ctx.restore();
    }
    function drawTankNickname(tank, name) {
      ctx.fillStyle = "#e8f2ff";
      ctx.font = "bold 11px 'Courier New', monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(name, tank.x, tank.y + tank.h / 2 + 8);
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
    }
    function drawTankHpBar(tank, hp) {
      if (hp <= 0) return;
      const maxHp = 3;
      const live = Math.max(0, Math.min(maxHp, hp | 0));
      const w = 39;
      const h = 8;
      const x = tank.x - w / 2;
      const y = tank.y + tank.h / 2 + 22;
      const segW = 12;
      const gap = 1.5;

      ctx.strokeStyle = "#7a7a7a";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, w, h);

      for (let i = 0; i < maxHp; i++) {
        const sx = x + 1 + i * (segW + gap);
        ctx.fillStyle = i < live ? "#39d26b" : "#0a0a0a";
        ctx.fillRect(sx, y + 1, segW, h - 2);
      }

      ctx.strokeStyle = "#7a7a7a";
      ctx.beginPath();
      ctx.moveTo(x + segW + gap + 0.5, y + 1);
      ctx.lineTo(x + segW + gap + 0.5, y + h - 1);
      ctx.moveTo(x + (segW + gap) * 2 + 0.5, y + 1);
      ctx.lineTo(x + (segW + gap) * 2 + 0.5, y + h - 1);
      ctx.stroke();
    }
    function drawWalls(list) {
      for (const wall of list || []) {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(wall.x + 3, wall.y + 3, wall.w, wall.h);
        const shade = 130 + wall.hp * 25;
        ctx.fillStyle = `rgb(${shade}, ${shade - 20}, ${shade - 50})`;
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        ctx.fillStyle = "#0f1720";
        ctx.font = "13px Segoe UI";
        ctx.fillText(String(wall.hp), wall.x + wall.w / 2 - 4, wall.y + wall.h / 2 + 4);
      }
    }
    function drawBullets(list) {
      for (const b of list || []) {
        ctx.fillStyle = b.owner === "player0" || b.owner === "player" ? "#9ee5ff" : "#ffc3c3";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r || 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function drawCrosshair() {
      if (!hasMouse) return;
      const r = 12, ext = 7;
      ctx.save();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouseX - r - ext, mouseY); ctx.lineTo(mouseX - r + 1, mouseY);
      ctx.moveTo(mouseX + r - 1, mouseY); ctx.lineTo(mouseX + r + ext, mouseY);
      ctx.moveTo(mouseX, mouseY - r - ext); ctx.lineTo(mouseX, mouseY - r + 1);
      ctx.moveTo(mouseX, mouseY + r - 1); ctx.lineTo(mouseX, mouseY + r + ext);
      ctx.stroke();
      ctx.restore();
    }

    function drawOverlay(message, sub) {
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(0, 0, world.w, world.h);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 38px Segoe UI";
      const mw = ctx.measureText(message).width;
      ctx.fillText(message, (world.w - mw) / 2, world.h / 2 - 8);
      if (sub) {
        ctx.font = "20px Segoe UI";
        const sw = ctx.measureText(sub).width;
        ctx.fillText(sub, (world.w - sw) / 2, world.h / 2 + 28);
      }
    }

    function formatRoundTime(secondsLeft) {
      const s = Math.max(0, Math.ceil(secondsLeft));
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function getRoundHudState() {
      if (mode === "online") {
        if (onlineState?.match) {
          const m = onlineState.match;
          return { currentRound: m.currentRound || 1, timer: m.roundTimeLeft ?? roundTime, winners: m.roundWinners || [] };
        }
        return { currentRound: 1, timer: roundTime, winners: [] };
      }
      return { currentRound, timer: roundTimer, winners: roundWinners };
    }

    function drawRoundHud() {
      const hud = getRoundHudState();
      const cx = world.w / 2;
      const top = 14;
      const hudWidth = 192;
      const hudHeight = 60;

      ctx.fillStyle = "rgba(10, 18, 28, 0.75)";
      ctx.strokeStyle = "rgba(130, 160, 180, 0.55)";
      ctx.lineWidth = 1;
      ctx.fillRect(cx - hudWidth / 2, top, hudWidth, hudHeight);
      ctx.strokeRect(cx - hudWidth / 2, top, hudWidth, hudHeight);

      ctx.fillStyle = "#e8f2ff";
      ctx.textAlign = "center";
      ctx.font = "bold 14px Segoe UI";
      const safeRound = Math.min(totalRounds, Math.max(1, hud.currentRound));
      ctx.fillText(`Round ${safeRound} / ${totalRounds}`, cx, top + 17);
      ctx.font = "bold 18px 'Courier New', monospace";
      ctx.fillText(formatRoundTime(hud.timer), cx, top + 36);

      const dotStartX = cx - 22;
      const dotsY = top + 50;
      for (let i = 0; i < totalRounds; i++) {
        const w = hud.winners[i];
        const x = dotStartX + i * 22;
        let fill = "#2d3b48";
        if (w === "player" || w === "player0") fill = "#5cc8ff";
        else if (w === "enemy" || w === "player1") fill = "#ff8a8a";
        else if (w === "draw") fill = "#aab8c3";
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.arc(x, dotsY, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#7c8c99";
        ctx.stroke();
      }
      ctx.textAlign = "start";
    }

    function render() {
      ctx.clearRect(0, 0, world.w, world.h);
      ctx.fillStyle = "rgba(255,255,255,0.05)";
      for (let x = 0; x < world.w; x += 40) ctx.fillRect(x, 0, 1, world.h);
      for (let y = 0; y < world.h; y += 40) ctx.fillRect(0, y, world.w, 1);
      drawRoundHud();

      if (mode === "online" && onlineState) {
        const p0 = onlineState.players?.[0];
        const p1 = onlineState.players?.[1];
        const p0Camo = CAMOS[onlineState.camos?.[0]] || CAMOS.classic;
        const p1Camo = CAMOS[onlineState.camos?.[1]] || CAMOS.classic;
        drawWalls(onlineState.walls);
        drawBullets(onlineState.bullets);
        if (p0) drawTank({ ...p0, camo: p0Camo });
        if (p1) drawTank({ ...p1, camo: p1Camo });
        if (p0) {
          drawTankNickname(p0, formatNickname(onlineState.nicknames?.[0], "P1"));
          drawTankHpBar(p0, p0.hp);
        }
        if (p1) {
          drawTankNickname(p1, formatNickname(onlineState.nicknames?.[1], "P2"));
          drawTankHpBar(p1, p1.hp);
        }
        ctx.fillStyle = "#dbefff";
        ctx.font = "16px Segoe UI";
        ctx.fillText(`P1 HP: ${p0 ? p0.hp : "-"}`, 16, 24);
        ctx.fillText(`P2 HP: ${p1 ? p1.hp : "-"}`, world.w - 96, 24);
      } else {
        drawWalls(walls);
        drawBullets(bullets);
        drawTank(player);
        drawTank(enemy);
        drawTankNickname(player, formatNickname(nicknameInput.value, "PLAYER"));
        drawTankHpBar(player, player.hp);
        drawTankNickname(enemy, formatNickname("AI BOT", "AI BOT"));
        drawTankHpBar(enemy, enemy.hp);
        ctx.fillStyle = "#dbefff";
        ctx.font = "16px Segoe UI";
        ctx.fillText(`Your HP: ${player.hp}`, 16, 24);
        ctx.fillText(`AI HP: ${enemy.hp}`, world.w - 96, 24);
      }

      if (mode === "ai" && gameOver) drawOverlay(winner, "Press R to restart");
      else if (mode === "ai" && !gameStarted) drawOverlay("Press R to start");
      else if (mode === "online" && gameOver) drawOverlay(winner, "Press Play Online");
      else if (mode === "online" && !gameStarted) drawOverlay("Online mode", onlineSearchActive ? "Searching for player..." : (statusEl.textContent || "Press Play Online"));
      drawCrosshair();
    }

    function sendOnlineInput() {
      if (mode !== "online" || !onlineSocket || onlineSocket.readyState !== WebSocket.OPEN || !myId) return;
      const now = performance.now();
      if (!shootQueued && now - lastSentInputAt < 40) return;
      if (shootQueued && onlineShootSoundCd <= 0) {
        playShootSound();
        onlineShootSoundCd = 0.45;
      }
      lastSentInputAt = now;
      onlineSocket.send(JSON.stringify({
        type: "input",
        up: keys.has("KeyW"),
        down: keys.has("KeyS"),
        left: keys.has("KeyA"),
        right: keys.has("KeyD"),
        aimX: mouseX,
        aimY: mouseY,
        shoot: shootQueued
      }));
      shootQueued = false;
    }

    function resetOnlineSessionState() {
      finishCreateLobbyRequest(false);
      gameOver = false;
      gameStarted = false;
      winner = "";
      onlineState = null;
      myId = null;
      shootQueued = false;
      onlineShootSoundCd = 0;
      onlineSearchActive = false;
      activeLobbyCode = "";
      myLobbyState = null;
      lobbyList = [];
      hideCreateLobbyForm();
      hideJoinPasswordForm();
      cancelSearchBtn.classList.add("hidden");
      renderLobbiesUi();
    }

    function setLobbyMeta(text) {
      lobbyMetaEl.textContent = text || "";
    }

    function setLobbiesModalOpen(open) {
      lobbiesModalEl.classList.toggle("hidden", !open);
    }

    function openLobbiesModal() {
      setLobbiesModalOpen(true);
      setLobbyMeta("Loading lobbies...");
      playMenuMusic();
      connectOnline({ type: "list_lobbies" }, false);
    }

    function closeLobbiesModal() {
      setLobbiesModalOpen(false);
      hideCreateLobbyForm();
      hideJoinPasswordForm();
      setLobbyMeta("");
    }

    function showCreateLobbyForm() {
      hideJoinPasswordForm();
      createLobbyNameInput.value = "";
      createLobbyPasswordInput.value = "";
      createLobbyModeInput.value = "1v1";
      createLobbySubmitBtn.disabled = false;
      setCreateLobbyNameError("");
      createLobbyFormLayerEl.classList.remove("hidden");
      createLobbyNameInput.focus();
    }

    function hideCreateLobbyForm() {
      setCreateLobbyNameError("");
      createLobbyFormLayerEl.classList.add("hidden");
    }

    function setCreateLobbyNameError(text) {
      if (!createLobbyNameErrorEl) return;
      createLobbyNameErrorEl.textContent = text || "";
    }

    function copyTextToClipboard(text) {
      const value = String(text || "").trim();
      if (!value) return Promise.resolve(false);
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(value).then(() => true).catch(() => false);
      }

      const temp = document.createElement("textarea");
      temp.value = value;
      temp.setAttribute("readonly", "");
      temp.style.position = "absolute";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      temp.select();
      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch {
        ok = false;
      }
      document.body.removeChild(temp);
      return Promise.resolve(ok);
    }

    function finishCreateLobbyRequest(success, errorMessage = "") {
      if (createLobbyTimeoutId) {
        clearTimeout(createLobbyTimeoutId);
        createLobbyTimeoutId = null;
      }
      createLobbyPending = false;
      createLobbySubmitBtn.disabled = false;
      if (success) {
        setCreateLobbyNameError("");
        return;
      }
      pendingCreatedLobbyMode = "";
      pendingCreatedLobbyMaxPlayers = 0;
      if (errorMessage) setLobbyMeta(errorMessage);
    }

    function startCreateLobbyRequest() {
      createLobbyPending = true;
      createLobbySubmitBtn.disabled = true;
      setLobbyMeta("Creating lobby...");
      if (createLobbyTimeoutId) clearTimeout(createLobbyTimeoutId);
      createLobbyTimeoutId = setTimeout(() => {
        finishCreateLobbyRequest(false, "Lobby creation timed out. Please try again.");
      }, 7000);
    }

    function submitCreateLobby() {
      const lobbyName = (createLobbyNameInput.value || "").trim();
      const password = (createLobbyPasswordInput.value || "").trim();
      const mode = createLobbyModeInput.value || "1v1";
      if (!lobbyName) {
        setCreateLobbyNameError("Lobby name is required.");
        createLobbyNameInput.focus();
        return;
      }
      if (createLobbyPending) return;
      setCreateLobbyNameError("");
      pendingCreatedLobbyMode = mode;
      pendingCreatedLobbyMaxPlayers = LOBBY_MODE_LIMITS[mode] || 2;
      startCreateLobbyRequest();
      connectOnline({ type: "create_lobby", lobbyName, password, mode }, false);
    }

    function showJoinPasswordForm(code, lobbyName = "Lobby") {
      hideCreateLobbyForm();
      pendingJoinLobbyCode = code || "";
      joinPasswordInput.value = "";
      joinPasswordTitle.textContent = `Enter password for ${lobbyName}`;
      joinPasswordFormLayerEl.classList.remove("hidden");
      joinPasswordInput.focus();
    }

    function hideJoinPasswordForm() {
      pendingJoinLobbyCode = "";
      joinPasswordFormLayerEl.classList.add("hidden");
    }

    function sendOnlineAction(socket, action) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      const nickname = formatNickname(nicknameInput.value, "PLAYER");
      const camo = selectedCamoId;
      if (action?.type === "create_lobby") {
        modeMetaEl.textContent = "";
        socket.send(JSON.stringify({
          type: "create_lobby",
          nickname,
          lobbyName: action.lobbyName || "",
          password: action.password || "",
          mode: action.mode || "1v1",
          camo
        }));
        return;
      }
      if (action?.type === "join_lobby") {
        modeMetaEl.textContent = "";
        socket.send(JSON.stringify({
          type: "join_lobby",
          code: action.code,
          nickname,
          password: action.password || "",
          camo
        }));
        return;
      }
      if (action?.type === "start_lobby_game") {
        socket.send(JSON.stringify({ type: "start_lobby_game" }));
        return;
      }
      if (action?.type === "cancel_queue") {
        socket.send(JSON.stringify({ type: "cancel_queue" }));
        return;
      }
      if (action?.type === "list_lobbies") {
        socket.send(JSON.stringify({ type: "list_lobbies" }));
        return;
      }
      modeMetaEl.textContent = "";
      socket.send(JSON.stringify({ type: "join_random", nickname, camo }));
    }

    function renderLobbiesUi() {
      const orderedLobbies = Array.isArray(lobbyList) ? [...lobbyList] : [];
      if (myLobbyState) {
        orderedLobbies.sort((a, b) => {
          if (a.code === myLobbyState.code) return -1;
          if (b.code === myLobbyState.code) return 1;
          return 0;
        });
      }

      const currentLobbyListEntry = myLobbyState
        ? orderedLobbies.find((lobby) => lobby.code === myLobbyState.code)
        : null;

      const currentLobbyView = myLobbyState
        ? { ...(currentLobbyListEntry || {}), ...myLobbyState }
        : null;

      myLobbyCardEl.innerHTML = "";
      if (currentLobbyView) {
        myLobbyCardEl.classList.remove("hidden");
        const title = document.createElement("div");
        title.className = "lobby-item-title";
        title.textContent = `${currentLobbyView.lobbyName || "Lobby"}`;
        const creator = document.createElement("div");
        creator.className = "lobby-item-line";
        creator.textContent = `Creator: ${currentLobbyView.creatorNickname}`;
        const mode = document.createElement("div");
        mode.className = "lobby-item-line";
        mode.textContent = `Mode: ${currentLobbyView.mode || "1v1"}`;
        const players = document.createElement("div");
        players.className = "lobby-item-line";
        players.style.marginBottom = "8px";
        const names = Array.isArray(currentLobbyView.memberNicknames) ? currentLobbyView.memberNicknames : [];
        const membersText = names.length > 0 ? names.join(", ") : "Waiting for player...";
        players.textContent = `Players: ${currentLobbyView.playerCount || names.length || 1}/${currentLobbyView.maxPlayers || 2} (${membersText})`;
        const codeChip = document.createElement("button");
        codeChip.type = "button";
        codeChip.className = "lobby-code-chip";
        codeChip.innerHTML = `Code: ${currentLobbyView.code} <span class="lobby-code-hint">(Click to copy)</span>`;
        codeChip.addEventListener("click", () => {
          copyTextToClipboard(currentLobbyView.code).then((ok) => {
            setLobbyMeta(ok ? "Lobby code copied." : "Unable to copy lobby code.");
          });
        });
        myLobbyCardEl.append(title, creator, mode, players, codeChip);

        const actions = document.createElement("div");
        actions.style.display = "flex";
        actions.style.gap = "8px";
        actions.style.alignItems = "center";

        if (myLobbyState.isCreator && myLobbyState.canStart) {
          const startBtn = document.createElement("button");
          startBtn.type = "button";
          startBtn.className = "main-action-btn";
          startBtn.style.height = "34px";
          startBtn.style.width = "160px";
          startBtn.textContent = "Start Game";
          startBtn.addEventListener("click", () => connectOnline({ type: "start_lobby_game" }, false));
          actions.appendChild(startBtn);
        }

        const leaveBtn = document.createElement("button");
        leaveBtn.type = "button";
        leaveBtn.className = "main-action-btn";
        leaveBtn.style.height = "34px";
        leaveBtn.style.width = "120px";
        leaveBtn.textContent = "Leave Lobby";
        leaveBtn.addEventListener("click", () => connectOnline({ type: "cancel_queue" }, false));
        actions.appendChild(leaveBtn);

        myLobbyCardEl.appendChild(actions);
      } else {
        myLobbyCardEl.classList.add("hidden");
      }

      lobbiesListEl.innerHTML = "";
      const visibleLobbies = orderedLobbies.filter((lobby) => !(myLobbyState && myLobbyState.code === lobby.code));

      if (visibleLobbies.length === 0 && myLobbyState) {
        lobbiesListEl.classList.add("hidden");
        return;
      }

      lobbiesListEl.classList.remove("hidden");
      if (visibleLobbies.length === 0) {
        const empty = document.createElement("div");
        empty.className = "lobby-empty";
        empty.textContent = "No lobbies yet";
        lobbiesListEl.appendChild(empty);
        return;
      }

      for (const lobby of visibleLobbies) {
        const row = document.createElement("div");
        row.className = "lobby-item";

        const info = document.createElement("div");
        const name = document.createElement("div");
        name.className = "lobby-item-title";
        const lockMark = lobby.hasPassword ? " \uD83D\uDD12" : "";
        name.textContent = `${lobby.lobbyName || "Lobby"}${lockMark}`;
        const creator = document.createElement("div");
        creator.className = "lobby-item-line";
        creator.textContent = `Creator: ${lobby.creatorNickname}`;
        const mode = document.createElement("div");
        mode.className = "lobby-item-line";
        mode.textContent = `Mode: ${lobby.mode || "1v1"}`;
        const members = document.createElement("div");
        members.className = "lobby-item-line";
        const names = Array.isArray(lobby.memberNicknames) ? lobby.memberNicknames : [];
        const membersText = names.length > 0 ? names.join(", ") : (lobby.joinedNickname || "Waiting for player...");
        members.textContent = `Players: ${lobby.playerCount}/${lobby.maxPlayers || 2} (${membersText})`;
        info.append(name, creator, mode, members);

        const joinBtn = document.createElement("button");
        joinBtn.type = "button";
        joinBtn.className = "main-action-btn lobby-join-btn";
        joinBtn.textContent = "Join";

        const isFull = lobby.playerCount >= (lobby.maxPlayers || 2);
        if (isFull) {
          joinBtn.disabled = true;
          joinBtn.textContent = "Full";
        } else if (myLobbyState) {
          joinBtn.disabled = true;
          joinBtn.textContent = "Busy";
        } else {
          joinBtn.addEventListener("click", () => {
            if (lobby.hasPassword) {
              showJoinPasswordForm(lobby.code, lobby.lobbyName || "Lobby");
            } else {
              connectOnline({ type: "join_lobby", code: lobby.code }, false);
            }
          });
        }

        row.append(info, joinBtn);
        lobbiesListEl.appendChild(row);
      }
    }

    function applyPendingLobbyMode(lobby) {
      if (!lobby || !pendingCreatedLobbyMode) return lobby;
      if (!activeLobbyCode || lobby.code !== activeLobbyCode) return lobby;
      return {
        ...lobby,
        mode: pendingCreatedLobbyMode,
        maxPlayers: pendingCreatedLobbyMaxPlayers || lobby.maxPlayers || 2
      };
    }

    function createOnlineSocket() {
      modeMetaEl.textContent = "";
      const socket = new WebSocket(ONLINE_SERVER_URL);
      socket._expectedClose = false;
      socket._hadError = false;
      socket._opened = false;
      onlineSocket = socket;

      socket.onopen = () => {
        if (onlineSocket !== socket) return;
        socket._opened = true;
        sendOnlineAction(socket, pendingOnlineAction || { type: "list_lobbies" });
        pendingOnlineAction = null;
      };

      socket.onmessage = (ev) => {
        if (onlineSocket !== socket) return;
        const msg = JSON.parse(ev.data);
        if (msg.type === "welcome") myId = msg.playerId;
        if (msg.type === "lobby_list") {
          lobbyList = Array.isArray(msg.lobbies) ? msg.lobbies.map((lobby) => applyPendingLobbyMode(lobby)) : [];
          renderLobbiesUi();
        }
        if (msg.type === "lobby_state") {
          myLobbyState = msg.lobby ? applyPendingLobbyMode(msg.lobby) : null;
          activeLobbyCode = myLobbyState?.code || "";
          onlineSearchActive = !!myLobbyState;
          if (myLobbyState) {
            if (createLobbyPending) finishCreateLobbyRequest(true);
            hideCreateLobbyForm();
            hideJoinPasswordForm();
            cancelSearchBtn.classList.remove("hidden");
            const playerCount = myLobbyState.playerCount || 1;
            const maxPlayers = myLobbyState.maxPlayers || 2;
            const waitingText = playerCount >= maxPlayers
              ? "Lobby is ready to start."
              : `Waiting for players (${playerCount}/${maxPlayers})...`;
            statusEl.textContent = `Lobby ${myLobbyState.code}`;
            modeMetaEl.textContent = `Lobby code: ${myLobbyState.code}`;
            setLobbyMeta(`${waitingText}`);
          } else {
            cancelSearchBtn.classList.add("hidden");
            setLobbyMeta("");
          }
          renderLobbiesUi();
        }
        if (msg.type === "queue") {
          onlineSearchActive = true;
          cancelSearchBtn.classList.remove("hidden");
          gameStarted = false;
          gameOver = false;
          winner = "";
          statusEl.textContent = msg.message || "Searching for player...";
          modeMetaEl.textContent = "";
        }
        if (msg.type === "lobby_created") {
          finishCreateLobbyRequest(true);
          hideCreateLobbyForm();
          onlineSearchActive = true;
          activeLobbyCode = msg.code || "";
          if (msg.mode) {
            pendingCreatedLobbyMode = msg.mode;
            pendingCreatedLobbyMaxPlayers = msg.maxPlayers || LOBBY_MODE_LIMITS[msg.mode] || 2;
          }
          cancelSearchBtn.classList.remove("hidden");
          statusEl.textContent = `Lobby ${activeLobbyCode} created. Waiting...`;
          modeMetaEl.textContent = "";
          setLobbyMeta(`Lobby code: ${activeLobbyCode}`);
        }
        if (msg.type === "join_password_required") {
          showJoinPasswordForm(msg.code || "", msg.lobbyName || "Lobby");
          setLobbyMeta(msg.message || "Enter password");
        }
        if (msg.type === "lobby_waiting") {
          onlineSearchActive = true;
          activeLobbyCode = msg.code || activeLobbyCode;
          cancelSearchBtn.classList.remove("hidden");
          statusEl.textContent = `Lobby ${activeLobbyCode} waiting for player...`;
          modeMetaEl.textContent = "";
          setLobbyMeta(msg.message || "Waiting for player...");
        }
        if (msg.type === "cancelled") {
          finishCreateLobbyRequest(false, msg.message || "Lobby creation cancelled.");
          onlineSearchActive = false;
          activeLobbyCode = "";
          myLobbyState = null;
          cancelSearchBtn.classList.add("hidden");
          statusEl.textContent = msg.message || "Search cancelled";
          modeMetaEl.textContent = "";
          if (!lobbiesModalEl.classList.contains("hidden")) sendOnlineAction(socket, { type: "list_lobbies" });
          renderLobbiesUi();
        }
        if (msg.type === "error") {
          finishCreateLobbyRequest(false, msg.message || "Unable to create lobby.");
          onlineSearchActive = false;
          cancelSearchBtn.classList.add("hidden");
          statusEl.textContent = msg.message || "Online error";
          modeMetaEl.textContent = "";
          setLobbyMeta(msg.message || "Online error");
          if (!lobbiesModalEl.classList.contains("hidden")) sendOnlineAction(socket, { type: "list_lobbies" });
        }
        if (msg.type === "start") {
          onlineSearchActive = false;
          myLobbyState = null;
          activeLobbyCode = "";
          renderLobbiesUi();
          cancelSearchBtn.classList.add("hidden");
          onlineState = msg.state;
          gameStarted = true;
          gameOver = false;
          winner = "";
          statusEl.textContent = "Online battle in progress";
          modeMetaEl.textContent = `You are player ${myId === "player0" ? "1" : "2"}`;
          closeLobbiesModal();
          if (appScreen !== "game") openGameScreen();
        }
        if (msg.type === "state") onlineState = msg.state;
        if (msg.type === "end") {
          gameOver = true;
          gameStarted = false;
          winner = msg.winnerId === myId ? "You win!" : "You lose";
          if (msg.winnerId === "draw") winner = "Match draw";
          if (Array.isArray(msg.roundWinners)) {
            if (!onlineState) onlineState = {};
            onlineState.match = {
              ...(onlineState.match || {}),
              currentRound: totalRounds,
              roundTimeLeft: 0,
              roundWinners: msg.roundWinners
            };
          }
          statusEl.textContent = winner;
        }
      };

      socket.onerror = () => {
        socket._hadError = true;
      };

      socket.onclose = () => {
        if (onlineSocket && onlineSocket !== socket) return;
        if (onlineSocket === socket) onlineSocket = null;
        if (createLobbyPending) finishCreateLobbyRequest(false, "Unable to create lobby. Server disconnected.");
        onlineSearchActive = false;
        myLobbyState = null;
        activeLobbyCode = "";
        renderLobbiesUi();
        cancelSearchBtn.classList.add("hidden");

        if (socket._expectedClose && reconnectAfterClose) {
          reconnectAfterClose = false;
          createOnlineSocket();
          return;
        }

        if (mode !== "online") return;
        gameStarted = false;

        // Distinguish real outage from normal/intentional close.
        if (socket._hadError) {
          statusEl.textContent = "Server disconnected";
          modeMetaEl.textContent = "Server unavailable. Run: node server.js";
          setLobbyMeta("Server unavailable");
        } else {
          statusEl.textContent = "Disconnected. Press Play Online";
          modeMetaEl.textContent = "Connection closed. Ready to reconnect.";
        }
      };
    }

    function connectOnline(action = { type: "join_random" }, hardReset = true) {
      setMode("online");
      pendingOnlineAction = action;
      if (hardReset) resetOnlineSessionState();
      reconnectAfterClose = false;

      if (onlineSocket && onlineSocket.readyState === WebSocket.OPEN) {
        sendOnlineAction(onlineSocket, action);
        pendingOnlineAction = null;
        return;
      }

      if (onlineSocket && onlineSocket.readyState === WebSocket.CONNECTING) {
        return;
      }

      if (onlineSocket && onlineSocket.readyState === WebSocket.CLOSING) {
        onlineSocket._expectedClose = true;
        reconnectAfterClose = true;
        return;
      }

      createOnlineSocket();
    }

    function cancelOnlineSearch() {
      if (mode !== "online") return;
      onlineSearchActive = false;
      cancelSearchBtn.classList.add("hidden");
      if (onlineSocket && onlineSocket.readyState === WebSocket.OPEN) {
        sendOnlineAction(onlineSocket, { type: "cancel_queue" });
      }
      if (appScreen === "game") {
        goToMainMenu();
      } else {
        myLobbyState = null;
        activeLobbyCode = "";
        renderLobbiesUi();
      }
    }

    function openGameScreen() {
      appScreen = "game";
      closeLobbiesModal();
      mainMenuEl.classList.add("hidden");
      gameAppEl.classList.remove("hidden");
      playGameMusic();
      if (!loopStarted) {
        loopStarted = true;
        requestAnimationFrame((ts) => { lastTime = ts; tick(ts); });
      }
    }

    function startFromMainMenu(modeToStart, action = null) {
      closeLobbiesModal();
      setLobbyMeta("");
      if (modeToStart === "online") {
        openGameScreen();
        connectOnline(action || { type: "join_random" });
      } else {
        if (onlineSocket) {
          onlineSocket._expectedClose = true;
          onlineSocket.close();
          onlineSocket = null;
        }
        setMode("ai");
        openGameScreen();
        startAiGame();
      }
      canvas.focus();
    }

    function goToMainMenu() {
      reconnectAfterClose = false;
      if (onlineSocket) {
        onlineSocket._expectedClose = true;
        onlineSocket.close();
        onlineSocket = null;
      }
      appScreen = "menu";
      mainMenuEl.classList.remove("hidden");
      gameAppEl.classList.add("hidden");
      closeLobbiesModal();
      myLobbyState = null;
      lobbyList = [];
      renderLobbiesUi();
      setMode("ai");
      enterWaitingState();
      playMenuMusic();
    }

    function tick(ts) {
      const dt = Math.max(0, Math.min(0.033, (ts - lastTime) / 1000));
      lastTime = ts;
      onlineShootSoundCd = Math.max(0, onlineShootSoundCd - dt);
      if (appScreen !== "game") {
        requestAnimationFrame(tick);
        return;
      }
      if (mode === "ai" && gameStarted && !gameOver) {
        if (!roundEnded) {
          updatePlayer(dt);
          updateEnemy(dt);
          updateBullets(dt);
          roundTimer -= dt;
          if (roundTimer <= 0) resolveAiTimerRound();
        } else {
          roundTransitionTimer -= dt;
          if (roundTransitionTimer <= 0) {
            if (currentRound < totalRounds) {
              currentRound += 1;
              resetAiRound();
              statusEl.textContent = "Battle in progress";
            } else {
              finishAiMatch();
            }
          }
        }
      } else if (mode === "online") {
        sendOnlineInput();
      }
      render();
      requestAnimationFrame(tick);
    }

    window.addEventListener("keydown", (e) => {
      if (appScreen !== "game") return;
      keys.add(e.code);
      if (e.code === "Space") {
        e.preventDefault();
        if (mode === "ai") shoot(player, "player");
        if (mode === "online") shootQueued = true;
      }
      if (e.code === "KeyR" && mode === "ai") startAiGame();
    });
    window.addEventListener("pointerdown", unlockAudioAndSync, { once: true });
    window.addEventListener("keydown", unlockAudioAndSync, { once: true });
    window.addEventListener("keyup", (e) => keys.delete(e.code));
    menuPlayAiBtn.addEventListener("click", () => startFromMainMenu("ai"));
    menuPlayOnlineRandomBtn.addEventListener("click", () => startFromMainMenu("online", { type: "join_random" }));
    menuOpenLobbiesBtn.addEventListener("click", () => openLobbiesModal());
    lobbiesCloseBtn.addEventListener("click", () => closeLobbiesModal());
    lobbiesBackdropEl.addEventListener("click", () => closeLobbiesModal());
    menuCreateLobbyBtn.addEventListener("click", () => showCreateLobbyForm());
    menuJoinLobbyBtn.addEventListener("click", () => {
      const code = (menuJoinLobbyInput.value || "").trim().toUpperCase();
      if (!code) {
        setLobbyMeta("Enter lobby code");
        return;
      }
      const lobby = lobbyList.find((item) => item.code === code);
      if (lobby?.hasPassword) {
        showJoinPasswordForm(code, lobby.lobbyName || "Lobby");
      } else {
        connectOnline({ type: "join_lobby", code }, false);
      }
    });
    createLobbyCancelBtn.addEventListener("click", () => hideCreateLobbyForm());
    createLobbySubmitBtn.addEventListener("click", () => submitCreateLobby());
    createLobbyNameInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      submitCreateLobby();
    });
    createLobbyPasswordInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      submitCreateLobby();
    });
    createLobbyModeInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      submitCreateLobby();
    });
    createLobbyNameInput.addEventListener("input", () => {
      if ((createLobbyNameInput.value || "").trim()) setCreateLobbyNameError("");
    });
    joinPasswordCancelBtn.addEventListener("click", () => hideJoinPasswordForm());
    joinPasswordSubmitBtn.addEventListener("click", () => {
      const code = pendingJoinLobbyCode;
      const password = (joinPasswordInput.value || "").trim();
      if (!code) return;
      if (!password) {
        setLobbyMeta("Enter password");
        joinPasswordInput.focus();
        return;
      }
      connectOnline({ type: "join_lobby", code, password }, false);
    });
    cancelSearchBtn.addEventListener("click", () => cancelOnlineSearch());
    backToMenuBtn.addEventListener("click", () => goToMainMenu());

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (world.w / rect.width);
      mouseY = (e.clientY - rect.top) * (world.h / rect.height);
      hasMouse = true;
    });
    canvas.addEventListener("mouseenter", () => { hasMouse = true; });
    canvas.addEventListener("mouseleave", () => { hasMouse = false; });
    canvas.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      if (mode === "ai") shoot(player, "player");
      if (mode === "online") shootQueued = true;
      canvas.focus();
    });

    camoGrid.addEventListener("click", (e) => {
      const btn = e.target.closest(".camo-btn");
      if (!btn) return;
      selectedCamoId = btn.dataset.camo;
      for (const item of camoButtons) item.setAttribute("aria-pressed", String(item === btn));
      if (player) player.camo = CAMOS[selectedCamoId];
      canvas.focus();
    });

    resetAiRound();
    enterWaitingState();
    renderLobbiesUi();
    setMode("ai");
    syncMusicWithScreen();
  </script>
</body>
</html>
